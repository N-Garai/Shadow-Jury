services:
  - type: web
    name: shadow-jury-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: MOCK_MODE
        value: "1"
    healthCheckPath: /api/health

  - type: web
    name: shadow-jury-frontend
    runtime: static
    buildCommand: ""
    startCommand: ""
    staticPublishPath: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars: []
